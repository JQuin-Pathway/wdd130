<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description"
      content="This page shows how to contact Deer River Rafting. You can find our address and other pertinent information here">
    <meta name="author" content="Jackson Quinton">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rafting_logo.jpg" alt="White Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact-head">
            <h1>Deer River Rafting Company</h1>
            <p>Roosevelt Lake Visitors Center<br>
                Roosevelt, AZ 85545<br>+1 999 999
                9999<br>info@deerriverrafting.com
            </p>
        </div>
        <section class="contact-grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d11168.847912130814!2d-111.13329144803316!3d33.669639896846924!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x872bdfb1ae23ba13%3A0x6a3eb2505892cdd6!2sRoosevelt%20Lake%20Visitors%20Center!5e0!3m2!1sen!2sus!4v1775341285071!5m2!1sen!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="user_name">Name:</label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>
                <div class="form-group">
                    <label for="user_email">Email:</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>
                <fieldset>
                    <legend>Purpose of Message:</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General
                        Inquiry</label>
                    <label><input type="radio" id="reserve" name="purpose" value="reservation">
                        Reservation
                        Question</label>
                    <label><input type="radio" id="suggest" name="purpose" value="suggestion">
                        Website
                        Suggestion</label>
                </fieldset>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="user_message" rows="4"></textarea>
                </div>
                <label class="newsletter">
                    <input type="checkbox" id="checkbox" name="subscribe"> Please sign me up for the
                    monthly
                    newsletter
                </label>
                <button type="submit">Get in Touch!</button>
            </form>
        </section>
        <section class="team-section">
            <h2>We Are Here to Serve You</h2>
            <div class="team-grid">
                <figure>
                    <img src="images/employee_1.jpg" alt="Employee 1" class="profile-pic">
                    <figcaption>Jeremy White</figcaption>
                </figure>
                <figure>
                    <img src="images/employee_2.jpg" alt="Employee 2" class="profile-pic">
                    <figcaption>Natasha Humbandug</figcaption>
                </figure>
                <figure>
                    <img src="images/employee_3.jpg" alt="Employee 3" class="profile-pic">
                    <figcaption>Fred Hooman</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | Deer River Rafting | Jackson Quinton</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://X.com">
                <img src="images/x-bw.svg" alt="X or Twitter Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
