<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description"
      content="This page shows how to contact Deer River Rafting. You can find our address and other pertinent information here">
    <meta name="author" content="Jackson Quinton">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rafting_logo.jpg" alt="White Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact-head">
            <h1>Deer River Rafting Company</h1>
            <p>123 Main River Street<br>Kolob, California<br>+1 999 999
                9999<br>info@deerriverrafting.com
            </p>
        </div>
        <section class="contact-grid">
            <div class="map-placeholder">
                <img src="" alt="">
            </div>
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="user_name">Name:</label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>
                <div class="form-group">
                    <label for="user_email">Email:</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>
                <fieldset>
                    <legend>Purpose of Message:</legend>
                    <label><input type="radio" id="purpose" name="purpose" value="general"> General
                        Inquiry</label>
                    <label><input type="radio" id="purpose" name="purpose" value="reservation">
                        Reservation
                        Question</label>
                    <label><input type="radio" id="purpose" name="purpose" value="suggestion">
                        Website
                        Suggestion</label>
                </fieldset>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="user_message" rows="4"></textarea>
                </div>
                <label class="newsletter">
                    <input type="checkbox" id="checkbox" name="subscribe"> Please sign me up for the
                    monthly
                    newsletter
                </label>
                <button type="submit">Get in Touch!</button>
            </form>
        </section>
        <section class="team-section">
            <h2>We Are Here to Serve You</h2>
            <div class="team-grid">
                <figure>
                    <img src="" alt="Employee 1" class="profile-pic">
                    <figcaption></figcaption>
                </figure>
                <figure>
                    <img src="" alt="Employee 2" class="profile-pic">
                    <figcaption></figcaption>
                </figure>
                <figure>
                    <img src="" alt="Employee 3" class="profile-pic">
                    <figcaption></figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | Deer River Rafting | Jackson Quinton</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://X.com">
                <img src="images/x-bw.svg" alt="X or Twitter Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
